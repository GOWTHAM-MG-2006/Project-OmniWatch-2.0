version: "3.9"

# Simulated microservices for OmniWatch 2.0 testing

services:
  payment-service:
    build: ./payment-service
    ports:
      - "8081:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  inventory-service:
    build: ./inventory-service
    ports:
      - "8082:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
